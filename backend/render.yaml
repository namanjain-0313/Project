# render.yaml
# Render reads this file to know how to deploy your backend.
# Commit this to your backend GitHub repo root.

services:
  - type: web
    name: goe-backend
    env: python
    region: singapore   # closest to India
    plan: free

    # Render runs this command to start the server
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Render runs this once before starting (installs dependencies + spaCy model)
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm

    # Environment variables — set these in Render dashboard, not here
    # (never put real secrets in this file)
    envVars:
      - key: NEO4J_URL
        sync: false   # means: set this manually in Render dashboard
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_USERNAME
        value: neo4j
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.0